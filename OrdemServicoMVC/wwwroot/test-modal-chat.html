<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Chat Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/@microsoft/signalr@latest/dist/browser/signalr.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1>Teste do Chat do Modal</h1>
        
        <!-- Simular estrutura do modal -->
        <div class="card" style="height: 500px;">
            <div class="card-header">
                <h5>Chat - Ordem de Serviço #1</h5>
            </div>
            <div class="card-body d-flex flex-column">
                <!-- Área de mensagens -->
                <div id="chat-messages-modal" class="flex-grow-1 overflow-auto mb-3 border rounded p-2" style="height: 300px;">
                    <div class="mb-2 text-start">
                        <div class="d-inline-block p-2 rounded bg-white border" style="max-width: 80%; word-wrap: break-word;">
                            <div class="fw-bold small mb-1">Usuário Teste</div>
                            <div>Mensagem de teste existente</div>
                            <div class="small mt-1 text-muted">10:30</div>
                        </div>
                    </div>
                </div>
                
                <!-- Formulário de envio -->
                <form id="form-enviar-mensagem-modal" class="d-flex gap-2">
                    <!-- Token será obtido dinamicamente via JavaScript -->
                    
                    <div class="flex-grow-1">
                        <textarea id="conteudo-mensagem-modal" 
                                  class="form-control" 
                                  rows="2" 
                                  placeholder="Digite sua mensagem..."
                                  style="resize: none;"></textarea>
                    </div>
                    
                    <div class="d-flex flex-column gap-1">
                        <input type="file" 
                               id="anexo-modal" 
                               class="form-control form-control-sm" 
                               multiple 
                               accept="image/*,.pdf,.doc,.docx,.txt"
                               style="display: none;">
                        
                        <button type="button" 
                                class="btn btn-outline-secondary btn-sm" 
                                onclick="document.getElementById('anexo-modal').click()">
                            <i class="bi bi-paperclip"></i>
                        </button>
                        
                        <button type="button" 
                                id="btn-enviar-mensagem-modal" 
                                class="btn btn-primary btn-sm">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </form>
                
                <!-- Preview de anexos -->
                <div id="preview-anexos-modal" class="mt-2"></div>
            </div>
        </div>
        
        <!-- Log de debug -->
        <div class="mt-4">
            <h5>Log de Debug</h5>
            <div id="debug-log" class="border rounded p-3" style="height: 200px; overflow-y: auto; background-color: #f8f9fa; font-family: monospace; font-size: 12px;"></div>
        </div>
    </div>
    
    <script>
        // Função para adicionar log de debug
        function addDebugLog(message) {
            const debugLog = document.getElementById('debug-log');
            const timestamp = new Date().toLocaleTimeString();
            debugLog.innerHTML += `[${timestamp}] ${message}<br>`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }
        
        // Interceptar console.log para mostrar no debug
        const originalConsoleLog = console.log;
        const originalConsoleError = console.error;
        
        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            addDebugLog('LOG: ' + args.join(' '));
        };
        
        console.error = function(...args) {
            originalConsoleError.apply(console, args);
            addDebugLog('ERROR: ' + args.join(' '));
        };
        
        // Aguardar carregamento da página
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 PÁGINA CARREGADA - Iniciando teste do chat...');
            
            // Buscar elementos do chat
            const chatMessages = document.getElementById('chat-messages-modal');
            const messageInput = document.getElementById('conteudo-mensagem-modal');
            const sendButton = document.getElementById('btn-enviar-mensagem-modal');
            const fileInput = document.getElementById('anexo-modal');
            const previewContainer = document.getElementById('preview-anexos-modal');
            const chatForm = document.getElementById('form-enviar-mensagem-modal');
            
            // Verificar se todos os elementos foram encontrados
            if (!chatMessages || !messageInput || !sendButton || !fileInput || !previewContainer || !chatForm) {
                console.error('ERRO CRÍTICO: Nem todos os elementos do chat foram encontrados!');
                console.log('chatMessages:', chatMessages, 'ID:', 'chat-messages-modal');
                console.log('messageInput:', messageInput, 'ID:', 'conteudo-mensagem-modal');
                console.log('sendButton:', sendButton, 'ID:', 'btn-enviar-mensagem-modal');
                console.log('fileInput:', fileInput, 'ID:', 'anexo-modal');
                console.log('previewContainer:', previewContainer, 'ID:', 'preview-anexos-modal');
                console.log('chatForm:', chatForm, 'ID:', 'form-enviar-mensagem-modal');
                return;
            }
            
            console.log('✅ SUCESSO: Todos os elementos do chat foram encontrados!');
            
            // Função para enviar mensagem
            async function sendMessage() {
                console.log('🚀 INICIANDO ENVIO DE MENSAGEM...');
                
                const content = messageInput.value.trim();
                const files = fileInput.files;
                
                console.log('📝 Conteúdo da mensagem:', content);
                console.log('📎 Arquivos selecionados:', files.length);
                
                if (!content && files.length === 0) {
                    console.log('❌ ERRO: Nenhum conteúdo ou arquivo fornecido');
                    alert('Digite uma mensagem ou selecione um arquivo antes de enviar.');
                    messageInput.focus();
                    return;
                }
                
                console.log('✅ Validação passou - prosseguindo com envio...');
                
                sendButton.disabled = true;
                sendButton.innerHTML = '<i class="bi bi-hourglass-split"></i>';
                
                try {
                    // Obter token antifalsificação válido do servidor
                    console.log('🔐 Obtendo token antifalsificação do servidor...');
                    const tokenResponse = await fetch('/');
                    const tokenHtml = await tokenResponse.text();
                    
                    // Extrair token do HTML usando regex
                    const tokenMatch = tokenHtml.match(/name="__RequestVerificationToken"[^>]*value="([^"]+)"/);
                    const token = tokenMatch ? tokenMatch[1] : '';
                    
                    console.log('🔐 Token obtido:', token ? 'Sucesso' : 'Falhou');
                    console.log('🔐 Valor do token:', token.substring(0, 20) + '...');
                    
                    const formData = new FormData();
                    formData.append('ordemServicoId', '1'); // ID de teste
                    formData.append('conteudo', content);
                    formData.append('__RequestVerificationToken', token);
                    
                    console.log('📦 FormData criado com:');
                    console.log('   - ordemServicoId: 1');
                    console.log('   - conteudo:', content);
                    console.log('   - token:', token ? 'Presente' : 'Ausente');
                    
                    if (files.length > 0) {
                        for (let i = 0; i < files.length; i++) {
                            formData.append('anexos', files[i]);
                            console.log('📎 Anexo adicionado:', files[i].name);
                        }
                    }
                    
                    console.log('🌐 ENVIANDO REQUISIÇÃO PARA O SERVIDOR...');
                    console.log('🌐 URL:', '/Mensagem/EnviarMensagemAjaxTeste');
                    console.log('🌐 Método:', 'POST');
                    
                    const response = await fetch('/Mensagem/EnviarMensagemAjaxTeste', {
                        method: 'POST',
                        body: formData
                    });
                    
                    console.log('📡 RESPOSTA RECEBIDA!');
                    console.log('📡 Status:', response.status);
                    console.log('📡 Status Text:', response.statusText);
                    console.log('📡 Content-Type:', response.headers.get('content-type'));
                    
                    // Verificar o conteúdo da resposta antes de fazer parse JSON
                    const responseText = await response.text();
                    console.log('📄 Conteúdo da resposta (primeiros 200 chars):', responseText.substring(0, 200));
                    
                    if (!response.ok) {
                        console.error('❌ Resposta não OK. Conteúdo completo:', responseText);
                        throw new Error(`Erro HTTP: ${response.status}`);
                    }
                    
                    // Tentar fazer parse JSON
                    let result;
                    try {
                        result = JSON.parse(responseText);
                    } catch (jsonError) {
                        console.error('❌ Erro ao fazer parse JSON:', jsonError);
                        console.error('❌ Conteúdo que causou erro:', responseText);
                        throw new Error('Resposta não é um JSON válido. Possível redirecionamento para login.');
                    }
                    console.log('📋 Resultado:', result);
                    
                    if (result.success) {
                        console.log('✅ Mensagem enviada com sucesso!');
                        messageInput.value = '';
                        fileInput.value = '';
                        previewContainer.innerHTML = '';
                        messageInput.focus();
                        
                        // Adicionar mensagem à interface
                        const messageDiv = document.createElement('div');
                        messageDiv.className = 'mb-2 text-end';
                        messageDiv.innerHTML = `
                            <div class="d-inline-block p-2 rounded bg-primary text-white" style="max-width: 80%; word-wrap: break-word;">
                                <div style="white-space: pre-wrap;">${content}</div>
                                <div class="small mt-1 text-white-50">${new Date().toLocaleTimeString()}</div>
                            </div>
                        `;
                        chatMessages.appendChild(messageDiv);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        
                    } else {
                        console.error('❌ Erro no envio:', result.message);
                        alert(result.message || 'Erro ao enviar mensagem.');
                    }
                    
                } catch (error) {
                    console.error('💥 ERRO CRÍTICO NA REQUISIÇÃO!');
                    console.error('💥 Tipo do erro:', error.name);
                    console.error('💥 Mensagem do erro:', error.message);
                    console.error('💥 Stack trace:', error.stack);
                    alert('Erro ao enviar mensagem. Verifique sua conexão e tente novamente.');
                } finally {
                    sendButton.disabled = false;
                    sendButton.innerHTML = '<i class="bi bi-send"></i>';
                }
            }
            
            // Event listeners
            sendButton.addEventListener('click', function(e) {
                e.preventDefault();
                console.log('🔥 BOTÃO DE ENVIO CLICADO!');
                sendMessage();
            });
            
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    console.log('🔥 ENTER PRESSIONADO!');
                    sendMessage();
                }
            });
            
            chatForm.addEventListener('submit', function(e) {
                e.preventDefault();
                return false;
            });
            
            console.log('🎉 Chat inicializado com sucesso!');
            messageInput.focus();
        });
    </script>
</body>
</html>
